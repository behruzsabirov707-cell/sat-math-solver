<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Math Solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#x221A;</span>
        <span class="logo-text">SAT Math Solver</span>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Solve Any SAT Math Problem</h1>
      <p class="subtitle">Paste your problem below and get a step-by-step solution with SAT tips instantly.</p>
    </section>

    <div class="card input-card">
      <label class="input-label" for="problem">Your SAT Math Problem</label>
      <textarea
        id="problem"
        placeholder="e.g. If 3x + 7 = 22, what is the value of 6x?&#10;&#10;Or paste the full problem including answer choices (A), (B), (C), (D)..."
        rows="6"
      ></textarea>

      <div class="examples">
        <span class="examples-label">Try an example:</span>
        <button class="example-btn" data-problem="If x² - 5x + 6 = 0, what are the values of x?">Quadratic</button>
        <button class="example-btn" data-problem="A line passes through the points (2, 3) and (6, 11). What is the slope of the line?&#10;&#10;(A) 1/2&#10;(B) 2&#10;(C) 4&#10;(D) 8">Slope</button>
        <button class="example-btn" data-problem="In a class of 30 students, 18 play soccer and 12 play basketball. If 5 students play both sports, how many students play neither?">Word Problem</button>
        <button class="example-btn" data-problem="The function f(x) = 2x² + bx + 8 has a vertex at x = 3. What is the value of b?">Functions</button>
      </div>

      <button id="solve-btn" onclick="solve()">
        <span class="btn-text">Solve Problem</span>
        <span class="btn-arrow">&#x2192;</span>
      </button>
    </div>

    <div class="card solution-card" id="solution-card" style="display:none">
      <div class="solution-header">
        <span class="solution-title">Solution</span>
        <button class="copy-btn" onclick="copySolution()" title="Copy solution">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
      <div id="solution-output" class="solution-output"></div>
      <div id="cursor" class="cursor"></div>
    </div>

    <div class="error-box" id="error-box" style="display:none">
      <span id="error-msg"></span>
    </div>
  </main>

  <footer>
    <p>SAT Math Solver &mdash; Step-by-step solutions for every SAT math topic</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
